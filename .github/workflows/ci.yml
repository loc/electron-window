name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - run: yarn test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - run: yarn build

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - name: Build library
        run: yarn build
      - name: Build E2E test app
        run: node tests/e2e/fixtures/test-app/build.js
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum yarn test:e2e
      - name: Run E2E tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: yarn test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

  electron-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        electron: ["30", "31", "32", "33"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - name: Install Electron ${{ matrix.electron }}
        run: yarn add -D electron@${{ matrix.electron }}
      - name: Build library
        run: yarn build
      - name: Build E2E test app
        run: node tests/e2e/fixtures/test-app/build.js
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: xvfb-run --auto-servernum yarn test:e2e
