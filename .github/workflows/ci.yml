name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      # src/generated-ipc/ is gitignored — typecheck needs it to resolve imports.
      # `yarn build` generates it via prebuild, but typecheck/test don't run prebuild.
      - run: yarn generate:ipc
      - run: yarn typecheck
      - run: yarn lint
      - run: yarn format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - run: yarn generate:ipc
      - run: yarn test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - run: yarn build

  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      # Ubuntu 24.04 restricted unprivileged user namespaces. Electron's
      # chrome-sandbox needs setuid root to work without them.
      - name: Fix chrome-sandbox (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo chown root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
      - name: Build library
        run: yarn build
      - name: Build E2E test app
        run: node tests/e2e/fixtures/test-app/build.js
      - name: Install Playwright
        run: npx playwright install --with-deps
      # Call playwright directly instead of `yarn test:e2e` — its pretest:e2e
      # hook runs `yarn build` again. We already built in explicit steps above.
      # The redundant second build also triggers a Windows heap-corruption
      # crash in tsup's DTS worker.
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test
      - name: Run E2E tests (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report/
          retention-days: 7

  electron-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Stable-1, stable, and prerelease. Electron ships a major ~every 8
        # weeks; bump the stable versions when a new one lands. `beta` is the
        # npm dist-tag (not a version), so it always pulls the current beta.
        electron: ["39", "40", "beta"]
    # Prerelease failures are informational, not blocking.
    continue-on-error: ${{ matrix.electron == 'beta' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --immutable
      - name: Install Electron ${{ matrix.electron }}
        run: yarn add -D electron@${{ matrix.electron }}
      # Re-run after the electron install — `yarn add` reinstalls the binary
      # and resets permissions. Same Ubuntu 24.04 userns issue as the e2e job.
      - name: Fix chrome-sandbox
        run: |
          sudo chown root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
      - name: Build library
        run: yarn build
      - name: Build E2E test app
        run: node tests/e2e/fixtures/test-app/build.js
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: xvfb-run --auto-servernum npx playwright test
