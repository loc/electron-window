name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # provenance attestation + (later) trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bootstrap: first publish uses NPM_TOKEN (Automation token from
          # npmjs.com). After the package exists, configure trusted publishing
          # at npmjs.com/package/@loc/electron-window/access → then this secret
          # can be deleted and OIDC takes over.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance works with or without trusted publishing — generates
          # the "published via GitHub Actions" attestation badge.
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release

  # Deploy docs after a successful release so the root docs reflect the
  # just-published version. docs.yml builds both root (from the new tag)
  # and /next/ (from main).
  docs:
    needs: release
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
