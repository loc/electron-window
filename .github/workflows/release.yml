name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm trusted publishing via OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # npm trusted publishing needs npm CLI 11.5.1+ (Node 22.14+).
          # Node 20's npm ~10 doesn't auto-detect GHA OIDC → ENONPMTOKEN.
          node-version: "lts/*"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — trusted publisher is configured at npmjs.com/
          # package/@loc/electron-window/access. npm CLI detects GHA's OIDC
          # env via id-token: write and does the exchange automatically.
          # Provenance is automatic with trusted publishing.
        run: npx semantic-release

  # Deploy docs after a successful release so the root docs reflect the
  # just-published version. docs.yml builds both root (from the new tag)
  # and /next/ (from main).
  docs:
    needs: release
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
